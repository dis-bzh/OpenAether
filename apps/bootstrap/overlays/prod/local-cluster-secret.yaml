# ==============================================================================
# ArgoCD — Local cluster registration
# Declares the management cluster itself as a managed cluster so the
# ApplicationSet can deploy apps/overlays/management/ to it.
#
# ArgoCD uses https://kubernetes.default.svc for in-cluster access.
# The openaether.io/role label routes the ApplicationSet to the correct overlay.
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cluster-management
  namespace: management-gitops
  labels:
    argocd.argoproj.io/secret-type: cluster
    openaether.io/managed: "true"
    openaether.io/role: management
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
