name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.2"

      - name: Check OpenTofu formatting
        run: tofu fmt -check -recursive
        working-directory: infrastructure/opentofu

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive
        working-directory: infrastructure/opentofu

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c infrastructure/.yamllint apps/ infrastructure/opentofu/bootstrap-manifests/

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.2"

      - name: Initialize OpenTofu (no backend)
        run: |
          rm -f .terraform/terraform.tfstate
          tofu init -backend=false
        working-directory: infrastructure/opentofu
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
          TF_VAR_encryption_passphrase: ci-mock-passphrase-for-validation-only-ci

      - name: Validate configuration
        run: tofu validate
        working-directory: infrastructure/opentofu
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
          TF_VAR_encryption_passphrase: ci-mock-passphrase-for-validation-only-ci

  test:
    name: OpenTofu Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.2"

      - name: Initialize OpenTofu (no backend)
        run: |
          rm -f .terraform/terraform.tfstate
          tofu init -backend=false
        working-directory: infrastructure/opentofu
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
          TF_VAR_encryption_passphrase: ci-mock-passphrase-for-validation-only-ci

      - name: Run all OpenTofu tests
        run: tofu test
        working-directory: infrastructure/opentofu
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
          TF_VAR_encryption_passphrase: ci-mock-passphrase-for-validation-only-ci

  kustomize:
    name: Validate Kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate bootstrap prod overlay
        run: kubectl kustomize apps/bootstrap/overlays/prod/ > /dev/null

      - name: Validate bootstrap local overlay
        run: kubectl kustomize apps/bootstrap/overlays/local/ > /dev/null

      - name: Validate management overlay
        run: kubectl kustomize apps/overlays/management/ > /dev/null

      - name: Validate workload-base overlay
        run: kubectl kustomize apps/overlays/workload-base/ > /dev/null

      - name: Validate local overlay
        run: kubectl kustomize apps/overlays/local/ > /dev/null

      - name: Validate prod overlay
        run: kubectl kustomize apps/overlays/prod/ > /dev/null

  talos:
    name: Talos Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install talosctl
        run: |
          curl -sL https://talos.dev/install | sh
          talosctl version --client

      - name: Generate Talos secrets
        run: talosctl gen secrets --output-file /tmp/talos-secrets.yaml

      - name: Generate Talos configs
        run: |
          talosctl gen config \
            --with-secrets /tmp/talos-secrets.yaml \
            --output /tmp/talos-configs \
            --output-types controlplane,worker \
            ci-test-cluster https://127.0.0.1:6443

      - name: Validate control plane config
        run: talosctl validate --config /tmp/talos-configs/controlplane.yaml --mode metal

      - name: Validate worker config
        run: talosctl validate --config /tmp/talos-configs/worker.yaml --mode metal

      - name: Check kube-proxy is disabled
        run: |
          grep -q 'disabled: true' /tmp/talos-configs/controlplane.yaml

  security:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infrastructure/
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/opentofu
          framework: terraform
          soft_fail: true
