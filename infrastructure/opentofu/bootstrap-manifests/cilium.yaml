# Placeholder for Cilium manifest
# This file is intentionally a placeholder.
# It MUST be generated before running 'tofu apply'

# Run the script to generate:
# ../../scripts/render-bootstrap-manifests.sh

# ------------------------------------------------------------------------------
# Why?
# We use 'inlineManifests' in Talos to inject Cilium at bootstrap.
# This ensures networking is up BEFORE nodes try to sync.
# Storing the exact manifest in source control ensures determinism
# and prevents tofu from showing massive diffs on every apply
# due to Helm chart dynamic rendering.
# ------------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-placeholder
  namespace: kube-system
